<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karoline E. Normann</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f1ec;
    --ink:#1a1a1a;
    --muted:#8a8378;
    --line:#d8d1c5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',sans-serif;
    font-weight:400;
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  header{
    display:grid;
    grid-template-columns:1fr auto;
    align-items:end;
    padding:2.5rem 3rem 1.5rem;
    border-bottom:1px solid var(--ink);
  }
  .name{
    font-size:1.1rem;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.18em;
  }
  .name a{color:inherit;text-decoration:none}
  nav ul{display:flex;gap:2.5rem;list-style:none}
  nav a{
    color:var(--ink);
    text-decoration:none;
    font-size:.8rem;
    font-weight:500;
    text-transform:uppercase;
    letter-spacing:.22em;
    padding-bottom:2px;
    transition:opacity .25s;
  }
  nav a:hover{opacity:.55}
  nav a.active{border-bottom:1.5px solid var(--ink)}

  main{padding:2.5rem 3rem 4rem}

  .row{display:grid;gap:1.5rem;margin-bottom:1.5rem}
  .row-top{grid-template-columns:repeat(3,1fr)}
  .row-bottom{grid-template-columns:repeat(4,1fr)}

  .tile{
    text-decoration:none;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    transition:transform .5s cubic-bezier(.2,.8,.2,1);
  }
  .tile:hover{transform:translateY(-4px)}
  .tile:hover .tile-img{filter:brightness(.96)}

  .tile-img{
    width:100%;
    aspect-ratio:4/5;
    background:linear-gradient(135deg,#e8e2d6 0%,#c9bfa9 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    font-size:.7rem;
    font-weight:500;
    letter-spacing:.3em;
    text-transform:uppercase;
    margin-bottom:.85rem;
    transition:filter .4s;
    overflow:hidden;
  }
  .row-bottom .tile-img{aspect-ratio:1/1}
  .tile-img img{width:100%;height:100%;object-fit:cover;display:block}

  .tile-label{
    font-size:.78rem;
    font-weight:500;
    text-transform:uppercase;
    letter-spacing:.22em;
  }

  footer{
    padding:2rem 3rem;
    border-top:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    font-size:.72rem;
    text-transform:uppercase;
    letter-spacing:.22em;
    color:var(--muted);
    font-weight:500;
  }
  footer a{color:inherit;text-decoration:none}
  footer a:hover{color:var(--ink)}

  .fade{opacity:0;transform:translateY(12px);animation:fade .8s forwards}
  .fade.d1{animation-delay:.05s}
  .fade.d2{animation-delay:.15s}
  .fade.d3{animation-delay:.25s}
  .fade.d4{animation-delay:.35s}
  .fade.d5{animation-delay:.45s}
  .fade.d6{animation-delay:.55s}
  .fade.d7{animation-delay:.65s}
  @keyframes fade{to{opacity:1;transform:translateY(0)}}

  @media(max-width:900px){
    header{grid-template-columns:1fr;gap:1.25rem;padding:1.75rem 1.5rem 1.25rem}
    .name{font-size:.95rem}
    nav ul{gap:1.25rem;flex-wrap:wrap}
    nav a{font-size:.7rem;letter-spacing:.18em}
    main{padding:1.5rem 1.5rem 3rem}
    .row-top,.row-bottom{grid-template-columns:repeat(2,1fr)}
    footer{padding:1.5rem;flex-direction:column;gap:.5rem;text-align:center}
  }
  @media(max-width:520px){
    .row-top,.row-bottom{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header>
  <div class="name fade d1"><a href="index.html">Karoline E. Normann</a></div>
  <nav>
    <ul>
      <li class="fade d2"><a href="index.html" class="active">Forside</a></li>
      <li class="fade d2"><a href="om.html">Om meg</a></li>
      <li class="fade d2"><a href="#kontakt">Kontakt</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="row row-top">
    <a href="avgangsoppgave.html#portefolje" class="tile fade d3">
      <div class="tile-img"><img src="bilder/bilde1.png" alt=""></div>
      <div class="tile-label">Portefølje 26</div>
    </a>
    <a href="avgangsoppgave.html#lookbok" class="tile fade d4">
      <div class="tile-img"><img src="bilder/bilde2.png" alt=""></div>
      <div class="tile-label">Lookbook 26</div>
    </a>
    <a href="avgangsoppgave.html#brandbook" class="tile fade d5">
      <div class="tile-img"><img src="bilder/bilde3.png" alt=""></div>
      <div class="tile-label">Brandbook 26</div>
    </a>
  </section>

  <section class="row row-bottom">
    <a href="avgangsoppgave.html#techpack1" class="tile fade d4">
      <div class="tile-img"><img src="bilder/bilde4.png" alt=""></div>
      <div class="tile-label">Techpack 26</div>
    </a>
    <a href="avgangsoppgave.html#techpack2" class="tile fade d5">
      <div class="tile-img"><img src="bilder/bilde5.png" alt=""></div>
      <div class="tile-label">Techpack 26</div>
    </a>
    <a href="avgangsoppgave.html#kolleksjonsplan" class="tile fade d6">
      <div class="tile-img"><img src="bilder/bilde6.png" alt=""></div>
      <div class="tile-label">Kolleksjonsplan</div>
    </a>
    <a href="arbeider.html" class="tile fade d7">
      <div class="tile-img"><img src="bilder/bilde7.png" alt=""></div>
      <div class="tile-label">Tidligere prosjekter</div>
    </a>
  </section>
</main>

<footer id="kontakt">
  <div>© 2026 Karoline E. Normann</div>
  <div>
    <a href="mailto:[e-post]">E-post</a>
    <a href="#" target="_blank">Instagram</a>
  </div>
</footer>

</body>
</html>
